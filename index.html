<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dot.tasks — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --yellow:  #F5C518;
      --amber:   #E8920A;
      --amber-light: #FBE28A;
      --text-dark: #1A1A1A;
      --text-mid:  #555555;
      --text-light: #888888;
      --white:   #FFFFFF;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--white);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── decorative background blobs ── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      pointer-events: none;
    }

    body::before {
      width: 560px;
      height: 560px;
      background: var(--yellow);
      top: -140px;
      right: -140px;
    }

    body::after {
      width: 420px;
      height: 420px;
      background: var(--amber);
      bottom: -120px;
      left: -120px;
    }

    /* ── main card ── */
    .card {
      position: relative;
      text-align: center;
      max-width: 560px;
      width: 90%;
      padding: 3rem 2.5rem 3.5rem;
      animation: fadeUp 0.8s ease both;
    }

    /* ── logo ── */
    .logo {
      width: 200px;
      height: auto;
      margin-bottom: 2.5rem;
    }

    /* ── eyebrow label ── */
    .eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      background: linear-gradient(135deg, var(--amber) 0%, var(--yellow) 100%);
      padding: 0.35em 1em;
      border-radius: 99px;
      margin-bottom: 1.4rem;
    }

    /* ── headline ── */
    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }

    h1 span {
      background: linear-gradient(135deg, var(--amber) 0%, var(--yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── sub-text ── */
    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-mid);
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }

    /* ── divider ── */
    .divider {
      width: 48px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--amber), var(--yellow));
      margin: 0 auto 2.5rem;
    }

    /* ── notify form ── */
    .notify-form {
      display: flex;
      gap: 0.6rem;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }

    .notify-form input[type="email"] {
      flex: 1;
      padding: 0.75rem 1.1rem;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1.5px solid #E5E5E5;
      border-radius: 10px;
      outline: none;
      color: var(--text-dark);
      background: #FAFAFA;
      transition: border-color 0.2s;
    }

    .notify-form input[type="email"]::placeholder {
      color: var(--text-light);
    }

    .notify-form input[type="email"]:focus {
      border-color: var(--yellow);
      background: var(--white);
    }

    .notify-form button {
      padding: 0.75rem 1.4rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--white);
      background: linear-gradient(135deg, var(--amber) 0%, var(--yellow) 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    .notify-form button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .notify-form button:active {
      transform: translateY(0);
    }

    /* ── success message ── */
    .success-msg {
      display: none;
      font-size: 0.88rem;
      color: var(--amber);
      font-weight: 500;
      margin-bottom: 2rem;
    }

    /* ── countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .countdown-number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--amber) 0%, var(--yellow) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      min-width: 2.5ch;
    }

    .countdown-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .countdown-sep {
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--amber-light);
      align-self: flex-start;
      margin-top: 0.1rem;
    }

    /* ── footer ── */
    .footer {
      font-size: 0.75rem;
      color: var(--text-light);
      letter-spacing: 0.04em;
    }

    /* ── animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .notify-form {
        flex-direction: column;
      }
      .countdown {
        gap: 1rem;
      }
      .countdown-number {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <main class="card">
    <img src="dot.logos7.png" alt="dot.tasks logo" class="logo" />

    <span class="eyebrow">Coming Soon</span>

    <h1>Big things are<br /><span>in progress.</span></h1>

    <p class="subtitle">
      We're putting the finishing touches on something that will
      help you manage tasks smarter and ship faster. Stay tuned.
    </p>

    <div class="divider"></div>

    <!-- Countdown -->
    <div class="countdown" id="countdown">
      <div class="countdown-item">
        <span class="countdown-number" id="cd-days">00</span>
        <span class="countdown-label">Days</span>
      </div>
      <span class="countdown-sep">:</span>
      <div class="countdown-item">
        <span class="countdown-number" id="cd-hours">00</span>
        <span class="countdown-label">Hours</span>
      </div>
      <span class="countdown-sep">:</span>
      <div class="countdown-item">
        <span class="countdown-number" id="cd-mins">00</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <span class="countdown-sep">:</span>
      <div class="countdown-item">
        <span class="countdown-number" id="cd-secs">00</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <!-- Notify form -->
    <form class="notify-form" id="notifyForm" novalidate>
      <input type="email" placeholder="Enter your email address" required aria-label="Email address" />
      <button type="submit">Notify Me</button>
    </form>
    <p class="success-msg" id="successMsg">You're on the list — we'll be in touch!</p>

    <p class="footer">&copy; 2026 dot.tasks. All rights reserved.</p>
  </main>

  <script>
    // ── Countdown to launch date ──────────────────────────────
    const LAUNCH = new Date('2026-09-01T00:00:00').getTime();

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const diff = LAUNCH - Date.now();
      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        return;
      }
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000)  / 60000);
      const secs  = Math.floor((diff % 60000)    / 1000);

      document.getElementById('cd-days').textContent  = pad(days);
      document.getElementById('cd-hours').textContent = pad(hours);
      document.getElementById('cd-mins').textContent  = pad(mins);
      document.getElementById('cd-secs').textContent  = pad(secs);
    }

    tick();
    setInterval(tick, 1000);

    // ── Notify form ───────────────────────────────────────────
    document.getElementById('notifyForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const input = this.querySelector('input[type="email"]');
      if (!input.value || !input.checkValidity()) {
        input.focus();
        return;
      }
      this.style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    });
  </script>

</body>
</html>
